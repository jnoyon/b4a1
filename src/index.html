<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Brillance - Effortless Custom Contract Billing</title>
        <link
            rel="icon"
            type="image/x-icon"
            href="./assets/images/services/logo.svg"
        />

        <meta
            name="description"
            content="Streamline your billing process with seamless automation for every custom contract, tailored by Brillance."
        />

        <!-- Google Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:wght@400&display=swap"
            rel="stylesheet"
        />

        <!-- Tailwind CSS v4 CDN -->
        <script src="https://cdn.tailwindcss.com"></script>

        <style>
            :root {
                --font-inter: "Inter", ui-sans-serif, system-ui, -apple-system,
                    BlinkMacSystemFont, sans-serif;
                --font-instrument-serif: "Instrument Serif", ui-serif, serif;
            }

            * {
                @apply border-[rgba(55,50,47,0.08)] outline-[rgba(55,50,47,0.50)];
            }

            body {
                @apply bg-[#F7F5F3] text-[#37322F] antialiased;
                font-family: var(--font-inter);
            }

            .font-serif {
                font-family: var(--font-instrument-serif);
            }

            .text-balance {
                text-wrap: balance;
            }

            .text-pretty {
                text-wrap: pretty;
            }

            .mix-blend-multiply {
                mix-blend-mode: multiply;
            }

            .backdrop-blur-custom {
                backdrop-filter: blur(8.25px);
            }
        </style>
    </head>
    <body class="antialiased">
        
    </body>
</html>
